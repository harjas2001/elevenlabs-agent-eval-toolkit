# ─────────────────────────────────────────────────────────────────
# utterances.example.yaml
# ElevenLabs Agent Eval Toolkit — STT Accuracy Test Cases
#
# Example extract of company training phrases used to demonstrate the format for STT accuracy test cases. Each utterance is tagged with relevant topics to facilitate analysis of WER by category.
# Word Error Rate (WER) is calculated per utterance and aggregated.
# ─────────────────────────────────────────────────────────────────

billing:
  - text: "What is my current account balance?"
    tags: [billing, balance]
  - text: "Why is my bill higher than usual this month?"
    tags: [billing, dispute]
  - text: "I'd like to dispute a charge on my latest invoice."
    tags: [billing, dispute]
  - text: "When is my next payment due?"
    tags: [billing, payment]
  - text: "Can I get a payment extension this month?"
    tags: [billing, payment, extension]
  - text: "I was charged twice for the same service."
    tags: [billing, dispute, duplicate]

plans:
  - text: "I want to upgrade to the premium plan."
    tags: [plan, upgrade]
  - text: "What data allowance do I get on the standard plan?"
    tags: [plan, data]
  - text: "How much does it cost to add international calling?"
    tags: [plan, international, add-on]
  - text: "Can I downgrade my plan without a cancellation fee?"
    tags: [plan, downgrade]
  - text: "What's the difference between the basic and standard plans?"
    tags: [plan, comparison]
  - text: "I'd like to switch to a SIM-only plan."
    tags: [plan, sim-only]

outages:
  - text: "There's no mobile signal at my address."
    tags: [outage, signal]
  - text: "My internet has been down since this morning."
    tags: [outage, internet]
  - text: "Is there a known outage in the Melbourne CBD?"
    tags: [outage, location]
  - text: "My calls keep dropping every few minutes."
    tags: [outage, call-quality]
  - text: "I received an SMS about planned maintenance. When will it be finished?"
    tags: [outage, maintenance]

account:
  - text: "I need to update my direct debit details."
    tags: [account, payment-method]
  - text: "Can I transfer my number to a new SIM?"
    tags: [account, number-transfer]
  - text: "I'd like to add my partner to my account."
    tags: [account, add-user]
  - text: "How do I activate roaming before my overseas trip?"
    tags: [account, roaming]
  - text: "I want to cancel my service."
    tags: [account, cancellation]

retention:
  - text: "I've seen a cheaper deal with another provider. Can you match it?"
    tags: [retention, competitor]
  - text: "I've been a customer for five years. What loyalty discounts do you offer?"
    tags: [retention, loyalty]
  - text: "I'm thinking about switching. What would I be missing out on?"
    tags: [retention, churn-risk]
